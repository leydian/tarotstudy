name: Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: API persona regression
        run: npm run test:persona --prefix apps/api

      - name: API hybrid resilience
        run: npm run test:hybrid --prefix apps/api

      - name: API overall-fortune regression
        run: npm run test:fortune --prefix apps/api

      - name: API metrics aggregation
        run: npm run test:metrics --prefix apps/api

      - name: API metrics threshold checks (optional when logs exist)
        run: |
          if ! ls apps/api/tmp/metrics*.log* >/dev/null 2>&1; then
            echo "No metrics logs in CI workspace. Skipping metrics threshold checks."
            exit 0
          fi
          npm run metrics:check --prefix apps/api
          npm run metrics:quality-check --prefix apps/api

      - name: Web UI contract regression
        run: npm run test:ui-contract --prefix apps/web

      - name: Web reading flow regression
        run: npm run test:ui-flow --prefix apps/web

      - name: Web unit tests
        run: npm run test:unit --prefix apps/web

      - name: Web build
        run: npm run build --prefix apps/web
