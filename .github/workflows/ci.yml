name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck web
        run: npm run typecheck:web

      - name: Web smoke tests
        run: npm run test:web

      - name: API tests
        run: npm run test:api

      - name: Build web
        run: npm run build:web

      - name: Full quality gate
        run: npm run verify:quality
